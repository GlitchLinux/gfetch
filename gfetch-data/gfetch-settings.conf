# ── ASCII Art Settings ──
# Path to ASCII art file
ASCII_FILE="/usr/local/bin/gfetch-data/gfetch-ascii-art"

# Number of rows in the ASCII art (for centering calculation)
# Default gfetch-ascii-art = 17 rows
ASCII_ROWS=17

# Extra spaces between ASCII art and sysinfo
ASCII_PAD_RIGHT=1

# ── Borderize Settings ──
# 1 = enabled, 0 = disabled
BORDERIZE_ENABLED=1

# Hex color for borderize border (without #)
BORDERIZE_BORDER_COLOR="000000"

# Hex color for borderize text (leave empty for terminal default)
BORDERIZE_TEXT_COLOR="ffffff"
